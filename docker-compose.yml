services:
  db:
    image: postgres:17
    container_name: rentelio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentelio
    ports:
      - "5432:5432"
    volumes:
      - rentelio_pgdata:/var/lib/postgresql/data

volumes:
  rentelio_pgdata:
